<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CurChat</title>
<link rel="icon" type="image/png" sizes="64x64" href="/assets/curchat-64.png?v=5"/>
<link rel="icon" type="image/png" sizes="192x192" href="/assets/curchat-180.png?v=5"/>
<link rel="apple-touch-icon" sizes="180x180" href="/assets/curchat-180.png?v=5"/>
<style>
:root {
  --bg: #0d1117;
  --panel: #141a24;
  --panel-soft: #171f2b;
  --panel-deep: #0f141d;
  --card: #1a2230;
  --card-strong: #1d2838;
  --line: #293241;
  --line-soft: #232c39;
  --text: #dbe3f1;
  --muted: #8f9bb0;
  --accent: #63b3ff;
  --accent-strong: #4da3ff;
  --danger: #ff7b7b;
  --ok: #7ee2a0;
  --radius: 12px;
  --radius-lg: 16px;
  --shadow-soft: 0 8px 24px rgba(0, 0, 0, .22);
}

* { box-sizing: border-box; }
html,
body {
  height: 100%;
  overflow: hidden;
}
body {
  margin: 0;
  background: radial-gradient(1200px 600px at 22% -20%, #1a2a44 0%, transparent 58%), var(--bg);
  color: var(--text);
  font-family: Inter, system-ui, -apple-system, sans-serif;
  min-height: 100svh;
  height: 100svh;
  display: grid;
  grid-template-columns: 280px 1fr;
  color-scheme: dark;
}
@supports (height: 100dvh) {
  body {
    min-height: 100dvh;
    height: 100dvh;
  }
}
#sidebar {
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, #151d29 0%, #111723 100%);
  display: flex;
  flex-direction: column;
  min-height: 0;
  box-shadow: inset -1px 0 0 rgba(255, 255, 255, .02);
}
#sidebar .head {
  padding: 16px;
  border-bottom: 1px solid var(--line);
}
#sidebar .head h1 {
  margin: 0 0 10px;
  font-size: 20px;
  font-weight: 800;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  letter-spacing: .01em;
}
#sidebar .head .brand-mark {
  width: 50px;
  height: 50px;
  border-radius: 40px;
  border: 1px solid rgba(118, 166, 255, .38);
  background: linear-gradient(180deg, rgba(117, 187, 255, .24) 0%, rgba(57, 99, 161, .26) 100%);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .12), 0 6px 14px rgba(23, 55, 100, .42);
  flex-shrink: 0;
}
#sidebar .head .brand-mark img {
  width: 49px;
  height: 49px;
  border-radius: 999px;
  object-fit: cover;
  box-shadow: 0 1px 5px rgba(0, 0, 0, .35);
}
#sidebar .head .brand-name {
  display: inline-block;
  transform: translateY(-0.5px);
  flex-shrink: 0;
}
#new-btn {
  width: 100%;
  border: 0;
  border-radius: 10px;
  padding: 10px 12px;
  cursor: pointer;
  background: linear-gradient(180deg, #6ec2ff 0%, var(--accent-strong) 100%);
  color: #09111f;
  font-weight: 700;
  box-shadow: 0 6px 16px rgba(77, 163, 255, .35);
}
#conv-list {
  list-style: none;
  padding: 8px;
  margin: 0;
  overflow-y: auto;
  flex: 1;
}
#conv-list li {
  padding: 10px 12px;
  border: 1px solid transparent;
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  background: linear-gradient(180deg, #1b2433 0%, #18202d 100%);
  transition: border-color .16s ease, transform .16s ease, background .16s ease;
}
#conv-list li.active {
  border-color: var(--accent-strong);
  background: linear-gradient(180deg, #20324c 0%, #1b2a40 100%);
  box-shadow: var(--shadow-soft);
}
.conv-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.conv-alert {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: #ff5f57;
  display: inline-block;
  flex-shrink: 0;
}
.conv-alert.failed {
  width: 16px;
  height: 16px;
  border-radius: 999px;
  background: #ff5f57;
  color: #fff;
  font-size: 11px;
  line-height: 16px;
  text-align: center;
  font-weight: 700;
}
.conv-meta {
  font-size: 11px;
  color: var(--muted);
}
.conv-path {
  margin-top: 4px;
  font-size: 11px;
  color: #7988a5;
  word-break: break-all;
}
#main {
  display: flex;
  flex-direction: column;
  min-height: 0;
  min-width: 0;
  height: 100%;
  overflow: hidden;
}
#view-tabs {
  display: flex;
  gap: 8px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--line);
  background: rgba(18, 24, 35, .88);
  backdrop-filter: blur(8px);
}
.tab-btn {
  border: 1px solid var(--line);
  background: var(--panel-soft);
  color: #cfd7e7;
  border-radius: 999px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s ease;
}
.tab-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.tab-alert {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: #ff5f57;
  display: none;
}
.tab-alert.failed {
  width: 16px;
  height: 16px;
  border-radius: 999px;
  background: #ff5f57;
  color: #fff;
  font-size: 11px;
  line-height: 16px;
  text-align: center;
  font-weight: 700;
}
.tab-btn.active {
  border-color: var(--accent-strong);
  color: #9cc9ff;
  background: #1c2a3d;
}
#topbar {
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  background: rgba(20, 26, 37, .92);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
#topbar > div:first-child {
  min-width: 0;
  flex: 1;
}
#sidebar-toggle-btn {
  display: none;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--panel-soft);
  color: var(--text);
  padding: 8px 10px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}
#topbar-actions {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
#title {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#meta {
  margin-top: 4px;
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#messages {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  padding: 20px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, .01) 0%, rgba(255, 255, 255, 0) 100%),
    var(--panel-deep);
}
.empty {
  color: var(--muted);
  text-align: center;
  margin-top: 100px;
}
.msg {
  width: 100%;
  max-width: 980px;
  margin: 0 auto 14px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}
.msg .role {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 700;
}
.bubble {
  white-space: normal;
  line-height: 1.6;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, .04);
  box-shadow: 0 4px 12px rgba(0, 0, 0, .14);
  max-width: min(78%, 760px);
  word-break: break-word;
}
.bubble .md-content {
  font-size: 13px;
}
.bubble .md-content > *:first-child {
  margin-top: 0;
}
.bubble .md-content > *:last-child {
  margin-bottom: 0;
}
.bubble .md-content p,
.bubble .md-content ul,
.bubble .md-content ol,
.bubble .md-content pre,
.bubble .md-content blockquote,
.bubble .md-content h1,
.bubble .md-content h2,
.bubble .md-content h3,
.bubble .md-content h4 {
  margin: 0 0 10px;
}
.bubble .md-content ul,
.bubble .md-content ol {
  padding-left: 1.35em;
}
.bubble .md-content li + li {
  margin-top: 4px;
}
.bubble .md-content code {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  font-size: .92em;
  background: rgba(16, 27, 43, .75);
  border: 1px solid rgba(113, 142, 183, .35);
  border-radius: 6px;
  padding: 1px 5px;
}
.bubble .md-content pre {
  background: #0f1724;
  border: 1px solid #2f3a4e;
  border-radius: 10px;
  padding: 10px 12px;
  overflow: auto;
}
.bubble .md-content pre code {
  background: transparent;
  border: 0;
  border-radius: 0;
  padding: 0;
  display: block;
  white-space: pre;
}
.bubble .md-content blockquote {
  margin-left: 0;
  margin-right: 0;
  padding: 6px 10px;
  border-left: 3px solid #4d6b93;
  color: #b9c5d9;
  background: rgba(16, 27, 43, .5);
  border-radius: 0 8px 8px 0;
}
.bubble .md-content a {
  color: #8ec8ff;
  text-decoration: underline;
  text-decoration-thickness: 1px;
}
.bubble .md-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 4px 0 10px;
}
.bubble .md-content th,
.bubble .md-content td {
  border: 1px solid #324258;
  padding: 6px 8px;
  text-align: left;
}
.bubble .md-content hr {
  border: 0;
  border-top: 1px solid #324258;
  margin: 12px 0;
}
.system-banner .md-content {
  font-size: 13px;
}
.system-banner .md-content > *:first-child {
  margin-top: 0;
}
.system-banner .md-content > *:last-child {
  margin-bottom: 0;
}
.msg.user .bubble {
  background: linear-gradient(180deg, #a7ec7d 0%, #8cdc62 100%);
  color: #10230d;
  border-color: rgba(45, 98, 28, .3);
  border-top-right-radius: 6px;
}
.msg.assistant .bubble {
  background: linear-gradient(180deg, #ffffff 0%, #f3f6fb 100%);
  color: #1b2738;
  border-color: rgba(120, 136, 160, .35);
  border-top-left-radius: 6px;
}
.msg.system .system-banner {
  background: linear-gradient(180deg, rgba(68, 56, 112, .9) 0%, rgba(48, 42, 83, .9) 100%);
  color: #ede7ff;
  border-top: 1px solid #635493;
  border-bottom: 1px solid #635493;
  border-left: 0;
  border-right: 0;
  border-radius: 0;
  width: 100%;
  text-align: center;
  padding: 9px 12px;
  box-shadow: none;
}
.msg.user {
  align-items: flex-end;
}
.msg.assistant {
  align-items: flex-start;
}
.msg.system {
  align-items: stretch;
  position: relative;
  margin-top: 12px;
  margin-bottom: 12px;
}
.msg.user .role {
  color: #95d98f;
}
.msg.assistant .role {
  color: #b8c5db;
}
.msg.system .role {
  display: none;
}
.msg.user .bubble .md-content a {
  color: #1e5822;
}
.msg.assistant .bubble .md-content a {
  color: #2f62b8;
}
.msg.system .system-banner .md-content {
  text-align: center;
}
.msg.system .system-banner .md-content p {
  margin: 0;
}
.msg.system .system-banner .md-content a {
  color: #bba2ff;
}
.msg.user .bubble .md-content code {
  background: rgba(255, 255, 255, .42);
  border-color: rgba(46, 102, 30, .28);
  color: #13310f;
}
.msg.assistant .bubble .md-content code {
  background: #eef2f9;
  border-color: #d1d9e6;
  color: #243246;
}
.msg.system .system-banner .md-content code {
  background: rgba(16, 14, 38, .48);
  border-color: rgba(172, 152, 255, .35);
  color: #e9e3ff;
}
.msg.user .bubble .md-content pre {
  background: rgba(255, 255, 255, .45);
  border-color: rgba(46, 102, 30, .28);
}
.msg.assistant .bubble .md-content pre {
  background: #f4f7fc;
  border-color: #d5deec;
}
.msg.system .system-banner .md-content pre {
  background: rgba(19, 14, 37, .64);
  border-color: #5b4b89;
}
.msg.user .bubble .md-content blockquote {
  border-left-color: #4f9d38;
  background: rgba(255, 255, 255, .35);
  color: #1b3a17;
}
.msg.assistant .bubble .md-content blockquote {
  border-left-color: #6a86b3;
  background: #edf2fa;
  color: #314666;
}
.msg.system .system-banner .md-content blockquote {
  border-left-color: #8772d1;
  background: rgba(23, 16, 44, .52);
  color: #d7ceff;
}
.msg.system .task-item {
  width: min(92%, 860px);
  margin-left: auto;
  margin-right: auto;
}
.system-task-actions {
  margin-top: 8px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.system-task-actions button {
  border: 1px solid var(--line);
  background: var(--panel-soft);
  color: var(--text);
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
}
#composer-wrap {
  border-top: 1px solid var(--line);
  padding: 14px 18px 18px;
  background: rgba(20, 26, 37, .94);
  backdrop-filter: blur(8px);
}
#composer-wrap.busy {
  background: #241f12;
  box-shadow: inset 0 1px 0 rgba(255, 196, 64, .18);
}
#composer {
  display: flex;
  gap: 10px;
  align-items: stretch;
}
#composer-ref-row {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.ref-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text);
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--panel-soft);
  padding: 4px 8px;
}
.ref-chip button {
  border: 0;
  background: transparent;
  color: #9aa7bf;
  cursor: pointer;
  font-size: 12px;
  line-height: 1;
}
.ref-chip-wrap {
  display: inline-flex;
  flex-direction: column;
  gap: 2px;
}
.ref-source-line {
  margin-left: 4px;
  font-size: 10px;
  color: #8b95aa;
  line-height: 1.2;
}
#input {
  flex: 1;
  min-height: 78px;
  max-height: 220px;
  resize: vertical;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  background: #101723;
  color: var(--text);
  padding: 12px 14px;
  font: inherit;
  transition: border-color .15s ease, box-shadow .15s ease;
}
#send-btn {
  width: 136px;
  border: 0;
  border-radius: var(--radius);
  background: linear-gradient(180deg, #70c4ff 0%, var(--accent-strong) 100%);
  color: #09111f;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(77, 163, 255, .35);
}
#quick-actions {
  width: 112px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
#run-quick-btn {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-soft);
  color: var(--text);
  font-weight: 700;
  font-size: 14px;
  min-height: 48px;
  cursor: pointer;
}
#auto-iterate-btn {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-soft);
  color: var(--text);
  font-weight: 700;
  font-size: 11px;
  min-height: 32px;
  cursor: pointer;
}
#send-btn:disabled, #new-btn:disabled {
  opacity: .55;
  cursor: default;
}
#status {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted);
  min-height: 18px;
  transition: color .15s ease, background .15s ease, border-color .15s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 0;
}
#status[data-kind="busy"] {
  color: #ffd166;
  background: rgba(255, 209, 102, .12);
  border: 1px solid rgba(255, 209, 102, .28);
  border-radius: 999px;
  padding: 6px 10px;
  font-weight: 700;
}
#status[data-kind="busy"]::before {
  content: "●";
  animation: busyPulse 1s infinite;
}
#delete-btn {
  border: 1px solid rgba(255, 123, 123, .32);
  background: rgba(255, 107, 107, .10);
  color: #ffabab;
  border-radius: 10px;
  padding: 10px 12px;
  cursor: pointer;
  font-weight: 700;
  flex-shrink: 0;
}
#delete-btn:disabled {
  opacity: .5;
  cursor: default;
}
#status[data-kind="error"] {
  color: #ff8f8f;
  background: rgba(255, 107, 107, .10);
  border: 1px solid rgba(255, 107, 107, .24);
  border-radius: 999px;
  padding: 6px 10px;
}
#status[data-kind="success"] {
  color: #8ce99a;
  background: rgba(105, 219, 124, .10);
  border: 1px solid rgba(105, 219, 124, .22);
  border-radius: 999px;
  padding: 6px 10px;
}
@keyframes busyPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .45; transform: scale(.85); }
}
#modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, .55);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  z-index: 60;
}
#modal-backdrop.show {
  display: flex;
}
#log-modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, .62);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  z-index: 70;
}
#log-modal-backdrop.show {
  display: flex;
}
#log-modal {
  width: min(900px, 100%);
  max-height: min(720px, calc(100vh - 48px));
  display: flex;
  flex-direction: column;
  background: #171f2b;
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 16px 40px rgba(0, 0, 0, .45);
}
#log-modal-head {
  padding: 12px 14px;
  border-bottom: 1px solid #262b36;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
#log-modal-title {
  font-size: 13px;
  font-weight: 700;
  color: #d9dde7;
}
#log-modal-close {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel-soft);
  color: var(--text);
  cursor: pointer;
  padding: 6px 10px;
}
#log-modal-body {
  padding: 0;
  overflow: auto;
  flex: 1;
  min-height: 180px;
}
#log-modal-content {
  margin: 0;
  padding: 12px 14px 16px;
  white-space: pre-wrap;
  word-break: break-word;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  font-size: 12px;
  line-height: 1.45;
  color: #d9dde7;
}
#modal {
  width: min(760px, 100%);
  max-height: min(680px, calc(100vh - 48px));
  display: flex;
  flex-direction: column;
  background: #171f2b;
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 16px 40px rgba(0, 0, 0, .45);
}
#modal-head {
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
}
#modal-head h2 {
  margin: 0;
  font-size: 16px;
}
#modal-sub {
  margin-top: 6px;
  font-size: 12px;
  color: var(--muted);
  word-break: break-all;
}
#modal-body {
  padding: 16px 18px;
  overflow: auto;
}
#create-type-row {
  display: grid;
  gap: 8px;
  margin-bottom: 12px;
}
#create-type-label {
  font-size: 12px;
  color: var(--muted);
}
#create-type-select,
.create-input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: #101723;
  color: var(--text);
  font-size: 13px;
  box-sizing: border-box;
}
#create-extra-fields {
  display: grid;
  gap: 10px;
  margin-bottom: 12px;
}
.create-field {
  display: grid;
  gap: 6px;
}
.create-field > label {
  font-size: 12px;
  color: var(--muted);
}
#picker-section {
  display: block;
}
#picker-toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}
#picker-current {
  flex: 1;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: #101723;
  color: var(--text);
  font-size: 12px;
  word-break: break-all;
}
.secondary-btn {
  border: 1px solid var(--line);
  background: var(--panel-soft);
  color: var(--text);
  border-radius: 10px;
  padding: 10px 12px;
  cursor: pointer;
}
#dir-list {

let yamlAceEditor = null;
let kaAceEditor = null;
let kaContentByConversation = {};
let conversationSummariesById = {};
let conversationStatusOverrides = {};
let conversationTaskRuntimeStatus = {};
let taskPollTimer = null;
let taskPollInFlight = false;
const WORKDIR_ROOT = '__WORKDIR_ROOT__';
const FILESYSTEM_ROOT = '/';

const MOBILE_BREAKPOINT = 860;

function isNarrowScreen() {
  return window.matchMedia(`(max-width: ${MOBILE_BREAKPOINT}px)`).matches;
}

function setSidebarHiddenMobile(hidden) {
  const shouldHide = !!hidden && isNarrowScreen();
  document.body.classList.toggle('mobile-sidebar-hidden', shouldHide);
  const btn = document.getElementById('sidebar-toggle-btn');
  if (btn) {
    btn.textContent = shouldHide ? 'Sessions' : 'Hide';
  }
}

function toggleSidebarMobile() {
  if (!isNarrowScreen()) return;
  const hidden = document.body.classList.contains('mobile-sidebar-hidden');
  setSidebarHiddenMobile(!hidden);
}

function syncMobileLayoutState() {
  if (isNarrowScreen()) {
    const hidden = document.body.classList.contains('mobile-sidebar-hidden');
    const hasConversation = !!currentId;
    document.body.classList.toggle('mobile-no-conversation', !hasConversation);
    if (!hasConversation && hidden) {
      setSidebarHiddenMobile(false);
    } else {
      setSidebarHiddenMobile(hidden);
    }
    return;
  }
  document.body.classList.remove('mobile-sidebar-hidden');
  document.body.classList.remove('mobile-no-conversation');
  const btn = document.getElementById('sidebar-toggle-btn');
  if (btn) {
    btn.textContent = 'Sessions';
  }
}

function applyStatusToUI(text, kind = 'normal') {
  const el = document.getElementById('status');
  el.textContent = text;
  el.dataset.kind = kind;
  document.getElementById('composer-wrap').classList.toggle('busy', kind === 'busy');
}

function fallbackStatusForConversation(conversation) {
  const status = String((conversation && conversation.status) || '').toLowerCase();
  if (status === 'running') {
    return { text: 'Waiting for Cursor...', kind: 'busy' };
  }
  if (status === 'error') {
    const err = conversation && conversation.last_error ? String(conversation.last_error) : 'Cursor request failed.';
    return { text: err, kind: 'error' };
  }
  return { text: 'Ready.', kind: 'normal' };
}

function renderCurrentConversationStatus() {
  if (!currentId) {
    applyStatusToUI('Ready.', 'normal');
    return;
  }
  const backendStatus = String((currentConversation && currentConversation.status) || '').toLowerCase();
  if (backendStatus === 'running' || backendStatus === 'error') {
    const fallback = fallbackStatusForConversation(currentConversation);
    applyStatusToUI(fallback.text, fallback.kind);
    return;
  }
  const saved = lastStatusByConversation[currentId];
  if (saved && typeof saved.text === 'string') {
    applyStatusToUI(saved.text, saved.kind || 'normal');
  } else {
    const fallback = fallbackStatusForConversation(currentConversation);
    applyStatusToUI(fallback.text, fallback.kind);
  }
}

function setStatus(text, kind = 'normal', conversationId = null) {
  const targetConversationId = conversationId || currentId;
  if (targetConversationId) {
    lastStatusByConversation[targetConversationId] = { text, kind };
  }
  if (conversationId && currentId && conversationId !== currentId) {
    return;
  }
  applyStatusToUI(text, kind);
}

async function api(url, options) {
  const res = await fetch(url, options);
  const raw = await res.text();
  let data = null;
  try {
    data = raw ? JSON.parse(raw) : {};
  } catch (_) {
    data = null;
  }

  if (!res.ok) {
    if (data && typeof data === 'object' && data.error) {
      throw new Error(String(data.error));
    }
    const brief = String(raw || '').trim().slice(0, 120).replace(/\s+/g, ' ');
    if (brief) {
      throw new Error(`HTTP ${res.status}: ${brief}`);
    }
    throw new Error('HTTP ' + res.status);
  }

  if (data && typeof data === 'object') {
    return data;
  }
  return {};
}

async function loadConversations(selectId = null, forceSelect = false) {
  const data = await api('/api/conversations');
  renderConversationList(data.conversations || []);
  if (selectId && (forceSelect || !currentId)) {
    await openConversation(selectId, false);
  } else if (currentId) {
    const found = (data.conversations || []).find(x => x.id === currentId);
    if (found) await openConversation(currentId, false);
  }
}

function refreshComposerControls() {
  const input = document.getElementById('input');
  const hasCurrent = !!currentId;
  const draftText = hasCurrent ? (conversationDrafts[currentId] || input.value || '') : '';
  const busyCurrent = hasCurrent && sendingConversationIds.has(currentId);
  const summary = hasCurrent ? (conversationSummariesById[currentId] || {}) : {};
  const autoRunning = !!(summary && summary.auto_iterating);
  const autoStopping = autoRunning && String(summary.status || '').toLowerCase() === 'stopping';
  document.getElementById('send-btn').disabled = !hasCurrent || !draftText.trim() || busyCurrent || autoRunning;
  document.getElementById('run-quick-btn').disabled = !hasCurrent;
  const autoBtn = document.getElementById('auto-iterate-btn');
  if (autoBtn) {
    autoBtn.textContent = autoStopping
      ? 'Stopping...'
      : (autoRunning ? 'Stop Auto Iterate' : 'Auto Iterate');
    autoBtn.disabled = !hasCurrent || busyCurrent || autoStopping || (!autoRunning && !draftText.trim());
  }
}

function getTaskRefsForConversation(conversationId) {
  if (!conversationId) return [];
  if (!Array.isArray(conversationTaskRefs[conversationId])) {
    conversationTaskRefs[conversationId] = [];
  }
  return conversationTaskRefs[conversationId];
}

function normalizeTaskStatus(status) {
  return String(status || 'unknown').toLowerCase();
}

function displayConversationStatus(rawStatus) {
  const value = String(rawStatus || 'unknown').toLowerCase();
  if (value === 'running') return 'waiting';
  return value;
}

function effectiveConversationStatus(item) {
  if (!item || !item.id) return 'unknown';
  const statusRaw = String(item.status || '').toLowerCase();
  if (statusRaw === 'stopping') return 'stopping';
  if (item.auto_iterating) {
    return 'iterating';
  }
  if (statusRaw === 'running') {
    return 'waiting';
  }
  const override = conversationStatusOverrides[item.id];
  if (override) return override;
  const runtime = conversationTaskRuntimeStatus[item.id];
  if (runtime) return runtime;
  return displayConversationStatus(item.status);
}

function runtimeStatusFromJobs(jobs) {
  const list = Array.isArray(jobs) ? jobs : [];
  let runningCount = 0;
  for (const job of list) {
    if (isRunningLikeTaskStatus(job && job.status)) {
      runningCount += 1;
    }
  }
  if (runningCount > 1) {
    return `${runningCount} jobs running`;
  }
  if (runningCount === 1) {
    return '1 job running';
  }
  return '';
}

function isRunningLikeTaskStatus(status) {
  return ['running', 'starting', 'queued', 'pending'].includes(normalizeTaskStatus(status));
}

function isTerminalTaskStatus(status) {
  return !isRunningLikeTaskStatus(status);
}

function isFailedTaskStatus(status) {
  return ['failed', 'error', 'timeout', 'aborted'].includes(normalizeTaskStatus(status));
}

function getConversationAlertSummary(conversationId) {
  const item = conversationSummariesById[conversationId] || {};
  const unreadCount = Number(item.task_unread_count || 0);
  const hasFailedUnread = !!item.task_has_failed_unread;
  return {
    unreadCount: Number.isFinite(unreadCount) ? unreadCount : 0,
    hasFailedUnread,
  };
}

function renderConversationAlertHtml(conversationItem) {
  const summary = {
    unreadCount: Number(conversationItem && conversationItem.task_unread_count || 0),
    hasFailedUnread: !!(conversationItem && conversationItem.task_has_failed_unread),
  };
  if (summary.hasFailedUnread) {
    return '<span class="conv-alert failed" title="Task failed">!</span>';
  }
  if (summary.unreadCount > 0) {
    return '<span class="conv-alert" title="Task update"></span>';
  }
  return '';
}

function refreshTaskTabAlert() {
  const el = document.getElementById('tab-tasks-alert');
  if (!el) return;
  const summary = currentId
    ? getConversationAlertSummary(currentId)
    : { unreadCount: 0, hasFailedUnread: false };
  const hasUnread = summary.unreadCount > 0;
  const hasFailed = !!summary.hasFailedUnread;
  if (hasFailed) {
    el.style.display = 'inline-block';
    el.classList.add('failed');
    el.textContent = '!';
    return;
  }
  if (hasUnread) {
    el.style.display = 'inline-block';
    el.classList.remove('failed');
    el.textContent = '';
    return;
  }
  el.style.display = 'none';
  el.classList.remove('failed');
  el.textContent = '';
}

async function pollTaskNotifications() {
  if (taskPollInFlight) return;
  taskPollInFlight = true;
  try {
    const data = await api('/api/conversations');
    const conversations = Array.isArray(data.conversations) ? data.conversations : [];
    const taskResults = await Promise.all(conversations.map(async (item) => {
      try {
        const taskData = await api(`/api/conversations/${item.id}/tasks`);
        return { id: item.id, jobs: Array.isArray(taskData.jobs) ? taskData.jobs : [] };
      } catch (_) {
        return { id: item.id, jobs: null };
      }
    }));
    const validIds = new Set(conversations.map(item => item.id));
    for (const id of Object.keys(conversationTaskRuntimeStatus)) {
      if (!validIds.has(id)) {
        delete conversationTaskRuntimeStatus[id];
      }
    }
    for (const result of taskResults) {
      if (!result.jobs) continue;
      const runtime = runtimeStatusFromJobs(result.jobs);
      if (runtime) {
        conversationTaskRuntimeStatus[result.id] = runtime;
      } else {
        delete conversationTaskRuntimeStatus[result.id];
      }
    }
    const refreshed = await api('/api/conversations');
    const latest = Array.isArray(refreshed.conversations) ? refreshed.conversations : [];
    renderConversationList(latest);
    refreshTaskTabAlert();
  } catch (err) {
    console.warn('Task notification poll failed:', err);
  } finally {
    taskPollInFlight = false;
  }
}

function startTaskNotificationPolling() {
  if (taskPollTimer) return;
  taskPollTimer = setInterval(pollTaskNotifications, 10000);
}

async function bootstrapConversations() {
  await pollTaskNotifications();
  if (!Object.keys(conversationSummariesById || {}).length) {
    await loadConversations();
  }
  startTaskNotificationPolling();
  syncMobileLayoutState();
}

function switchTab(view) {
  currentView = view;
  const chatPanel = document.getElementById('panel-chat');
  const taskPanel = document.getElementById('panel-tasks');
  const yamlPanel = document.getElementById('panel-yaml');
  const kaPanel = document.getElementById('panel-ka');
  const chatTab = document.getElementById('tab-chat');
  const taskTab = document.getElementById('tab-tasks');
  const yamlTab = document.getElementById('tab-yaml');
  const kaTab = document.getElementById('tab-ka');
  if (view === 'tasks') {
    chatPanel.style.display = 'none';
    taskPanel.style.display = 'flex';
    yamlPanel.style.display = 'none';
    kaPanel.style.display = 'none';
    chatTab.classList.remove('active');
    taskTab.classList.add('active');
    yamlTab.classList.remove('active');
    kaTab.classList.remove('active');
    loadTasksForCurrentConversation();
  } else if (view === 'yaml') {
    initYamlCodeEditor();
    chatPanel.style.display = 'none';
    taskPanel.style.display = 'none';
    yamlPanel.style.display = 'flex';
    kaPanel.style.display = 'none';
    chatTab.classList.remove('active');
    taskTab.classList.remove('active');
    yamlTab.classList.add('active');
    kaTab.classList.remove('active');
    loadYamlFileListForCurrentConversation(true);
  } else if (view === 'ka') {
    initKaCodeEditor();
    chatPanel.style.display = 'none';
    taskPanel.style.display = 'none';
    yamlPanel.style.display = 'none';
    kaPanel.style.display = 'flex';
    chatTab.classList.remove('active');
    taskTab.classList.remove('active');
    yamlTab.classList.remove('active');
    kaTab.classList.add('active');
    loadKaForCurrentConversation();
  } else {
    chatPanel.style.display = 'flex';
    taskPanel.style.display = 'none';
    yamlPanel.style.display = 'none';
    kaPanel.style.display = 'none';
    taskTab.classList.remove('active');
    yamlTab.classList.remove('active');
    kaTab.classList.remove('active');
    chatTab.classList.add('active');
  }
}

function renderKaUnavailable(text) {
  const refreshBtn = document.getElementById('refresh-ka-btn');
  const saveBtn = document.getElementById('save-ka-btn');
  const pathEl = document.getElementById('ka-path');

  refreshBtn.disabled = !currentId;
  saveBtn.disabled = true;
  setKaEditorEnabled(false);
  setKaEditorValue('');
  const editor = document.getElementById('ka-editor');
  editor.placeholder = text || 'No .ka available';
  pathEl.textContent = '';
}

async function loadKaForCurrentConversation() {
  if (!currentId) {
    renderKaUnavailable('No conversation selected.');
    return;
  }
  const refreshBtn = document.getElementById('refresh-ka-btn');
  const saveBtn = document.getElementById('save-ka-btn');
  const pathEl = document.getElementById('ka-path');

  try {
    setStatus('Loading .ka ...', 'busy');
    initKaCodeEditor();
    const data = await api(`/api/conversations/${currentId}/ka/file`);
    const content = String(data.content || '');
    kaContentByConversation[currentId] = content;
    setKaEditorValue(content);
    setKaEditorEnabled(true);
    saveBtn.disabled = false;
    refreshBtn.disabled = false;
    pathEl.textContent = String(data.relative_path || '.ka');
    if (data.created) {
      setStatus('.ka created from template and loaded.', 'success');
    } else {
      setStatus('.ka loaded.', 'success');
    }
  } catch (err) {
    renderKaUnavailable('Load .ka failed');
    setStatus('Load .ka failed: ' + err.message, 'error');
  }
}

async function saveKaForCurrentConversation() {
  if (!currentId) return;
  const saveBtn = document.getElementById('save-ka-btn');
  if (!document.getElementById('ka-editor')) return;
  try {
    setStatus('Saving .ka ...', 'busy');
    const content = getKaEditorValue();
    await api(`/api/conversations/${currentId}/ka/file`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ content: content || '' })
    });
    kaContentByConversation[currentId] = content || '';
    saveBtn.disabled = false;
    setStatus('.ka saved.', 'success');
  } catch (err) {
    setStatus('Save .ka failed: ' + err.message, 'error');
  }
}

function initKaCodeEditor() {
  if (kaAceEditor) return;
  const textarea = document.getElementById('ka-editor');
  const host = document.getElementById('ka-editor-ace');
  if (!textarea || !host) return;
  if (!window.ace || typeof window.ace.edit !== 'function') {
    return;
  }

  kaAceEditor = window.ace.edit(host);
  kaAceEditor.setTheme('ace/theme/tomorrow_night_eighties');
  kaAceEditor.session.setMode('ace/mode/sh');
  kaAceEditor.session.setUseWrapMode(true);
  kaAceEditor.setShowPrintMargin(false);
  kaAceEditor.setHighlightActiveLine(true);
  kaAceEditor.setFontSize(13);
  kaAceEditor.setOptions({
    tabSize: 2,
    useSoftTabs: true,
    showFoldWidgets: true,
    enableBasicAutocompletion: false,
    enableLiveAutocompletion: false,
  });

  kaAceEditor.session.setValue(textarea.value || '');
  kaAceEditor.session.on('change', () => {
    textarea.value = kaAceEditor.getValue();
  });

  host.style.display = 'block';
  textarea.style.display = 'none';
  setKaEditorEnabled(!textarea.disabled);
}

function getKaEditorValue() {
  const textarea = document.getElementById('ka-editor');
  if (kaAceEditor) {
    return kaAceEditor.getValue();
  }
  return textarea.value;
}

function setKaEditorValue(text) {
  const textarea = document.getElementById('ka-editor');
  const next = String(text || '');
  textarea.value = next;
  if (kaAceEditor) {
    const current = kaAceEditor.getValue();
    if (current !== next) {
      kaAceEditor.session.setValue(next);
      kaAceEditor.clearSelection();
    }
  }
}

function setKaEditorEnabled(enabled) {
  const textarea = document.getElementById('ka-editor');
  const host = document.getElementById('ka-editor-ace');
  textarea.disabled = !enabled;
  if (kaAceEditor) {
    kaAceEditor.setReadOnly(!enabled);
    host.classList.toggle('disabled', !enabled);
  }
}

async function initYamlCodeEditor() {
  if (yamlAceEditor || yamlCmView || yamlCmInitStarted) return;
  const textarea = document.getElementById('yaml-editor');
  const cmHost = document.getElementById('yaml-editor-cm');
  if (!textarea || !cmHost) return;

  if (window.ace && typeof window.ace.edit === 'function') {
    yamlAceEditor = window.ace.edit(cmHost);
    yamlAceEditor.setTheme('ace/theme/tomorrow_night_eighties');
    yamlAceEditor.session.setMode('ace/mode/yaml');
    yamlAceEditor.session.setUseWrapMode(true);
    yamlAceEditor.setShowPrintMargin(false);
    yamlAceEditor.setHighlightActiveLine(true);
    yamlAceEditor.setFontSize(13);
    yamlAceEditor.setOptions({
      tabSize: 2,
      useSoftTabs: true,
      showFoldWidgets: true,
      enableBasicAutocompletion: false,
      enableLiveAutocompletion: false,
    });
    yamlAceEditor.session.setValue(textarea.value || '');
    yamlAceEditor.session.on('change', () => {
      textarea.value = yamlAceEditor.getValue();
    });

    cmHost.style.display = 'block';
    textarea.style.display = 'none';
    setYamlEditorEnabled(!textarea.disabled);
    return;
  }

  yamlCmInitStarted = true;

  try {
    const [
      stateMod,
      viewMod,
      languageMod,
      yamlMod,
      commandsMod,
      historyMod,
      lezerMod,
    ] = await Promise.all([
      import('https://esm.sh/@codemirror/state@6.4.1'),
      import('https://esm.sh/@codemirror/view@6.28.6'),
      import('https://esm.sh/@codemirror/language@6.10.2'),
      import('https://esm.sh/@codemirror/lang-yaml@6.1.1'),
      import('https://esm.sh/@codemirror/commands@6.6.2'),
      import('https://esm.sh/@codemirror/history@0.19.2'),
      import('https://esm.sh/@lezer/highlight@1.2.1'),
    ]);

    const { EditorState, Compartment } = stateMod;
    const { EditorView, keymap } = viewMod;
    const { HighlightStyle, syntaxHighlighting } = languageMod;
    const { yaml } = yamlMod;
    const { defaultKeymap } = commandsMod;
    const { history, historyKeymap } = historyMod;
    const { tags } = lezerMod;
    yamlCmEditorStateMod = stateMod;
    yamlCmEditorViewMod = viewMod;

    yamlCmEditableCompartment = new Compartment();
    yamlCmReadOnlyCompartment = new Compartment();

    const commentHighlight = HighlightStyle.define([
      { tag: tags.comment, color: '#7fb3ff', fontStyle: 'italic' },
    ]);

    yamlCmView = new EditorView({
      state: EditorState.create({
        doc: textarea.value || '',
        extensions: [
          history(),
          keymap.of([...defaultKeymap, ...historyKeymap]),
          yaml(),
          syntaxHighlighting(commentHighlight),
          EditorView.lineWrapping,
          EditorView.theme({
            '&': { color: '#d9dde7', backgroundColor: '#0f1218' },
            '.cm-content': { padding: '12px', caretColor: '#d9dde7' },
            '.cm-gutters': {
              backgroundColor: '#0f1218',
              color: '#78849b',
              borderRight: '1px solid #2b3240',
            },
            '&.cm-focused': { outline: 'none' },
            '.cm-activeLineGutter': { backgroundColor: '#171d29' },
            '.cm-selectionBackground': { backgroundColor: '#234169 !important' },
          }, { dark: true }),
          yamlCmEditableCompartment.of(EditorView.editable.of(false)),
          yamlCmReadOnlyCompartment.of(EditorState.readOnly.of(true)),
          EditorView.updateListener.of((update) => {
            if (update.docChanged) {
              textarea.value = update.state.doc.toString();
            }
          }),
        ],
      }),
      parent: cmHost,
    });

    cmHost.style.display = 'block';
    textarea.style.display = 'none';
  } catch (err) {
    console.warn('CodeMirror YAML init failed, fallback to textarea editor.', err);
  }
}

function getYamlEditorValue() {
  const textarea = document.getElementById('yaml-editor');
  if (yamlAceEditor) {
    return yamlAceEditor.getValue();
  }
  if (yamlCmView) {
    return yamlCmView.state.doc.toString();
  }
  return textarea.value;
}

function setYamlEditorValue(text) {
  const textarea = document.getElementById('yaml-editor');
  const next = String(text || '');
  textarea.value = next;
  if (yamlAceEditor) {
    const currentAce = yamlAceEditor.getValue();
    if (currentAce !== next) {
      yamlAceEditor.session.setValue(next);
      yamlAceEditor.clearSelection();
    }
    return;
  }
  if (yamlCmView) {
    const current = yamlCmView.state.doc.toString();
    if (current !== next) {
      yamlCmView.dispatch({
        changes: { from: 0, to: current.length, insert: next },
      });
    }
  }
}

function setYamlEditorEnabled(enabled) {
  const textarea = document.getElementById('yaml-editor');
  const cmHost = document.getElementById('yaml-editor-cm');
  textarea.disabled = !enabled;
  if (yamlAceEditor) {
    yamlAceEditor.setReadOnly(!enabled);
    cmHost.classList.toggle('disabled', !enabled);
    return;
  }
  if (yamlCmView && yamlCmEditableCompartment && yamlCmReadOnlyCompartment && yamlCmEditorViewMod && yamlCmEditorStateMod) {
    const EditorView = yamlCmEditorViewMod.EditorView;
    const EditorState = yamlCmEditorStateMod.EditorState;
    yamlCmView.dispatch({
      effects: [
        yamlCmEditableCompartment.reconfigure(EditorView.editable.of(enabled)),
        yamlCmReadOnlyCompartment.reconfigure(EditorState.readOnly.of(!enabled)),
      ],
    });
  }
  cmHost.classList.toggle('disabled', !enabled);
}

function renderYamlUnavailable(text) {
  const select = document.getElementById('yaml-file-select');
  const refreshBtn = document.getElementById('refresh-yaml-btn');
  const saveBtn = document.getElementById('save-yaml-btn');
  const editor = document.getElementById('yaml-editor');
  const pathEl = document.getElementById('yaml-path');

  select.innerHTML = `<option value="">${escapeHtml(text)}</option>`;
  select.disabled = true;
  refreshBtn.disabled = !currentId;
  saveBtn.disabled = true;
  setYamlEditorValue('');
  setYamlEditorEnabled(false);
  pathEl.textContent = '';
}

function renderYamlFileOptions(conversationId, files) {
  const select = document.getElementById('yaml-file-select');
  const refreshBtn = document.getElementById('refresh-yaml-btn');
  const editor = document.getElementById('yaml-editor');

  refreshBtn.disabled = !conversationId;
  if (!conversationId) {
    renderYamlUnavailable('No conversation selected.');
    return;
  }

  if (!files.length) {
    renderYamlUnavailable('No YAML file available');
    editor.placeholder = 'This conversation has no editable YAML file under configs/.';
    return;
  }

  const savedName = yamlSelectionByConversation[conversationId] || '';
  const chosen = files.find(x => x.name === savedName) ? savedName : files[0].name;
  yamlSelectionByConversation[conversationId] = chosen;

  select.innerHTML = files
    .map(item => `<option value="${escapeHtml(item.name)}">${escapeHtml(item.name)}</option>`)
    .join('');
  select.disabled = false;
  select.value = chosen;
}

async function loadYamlFileListForCurrentConversation(loadSelected = true) {
  if (!currentId) {
    renderYamlUnavailable('No conversation selected.');
    return;
  }
  try {
    setStatus('Loading YAML files...', 'busy');
    const data = await api(`/api/conversations/${currentId}/yaml/files`);
    const files = Array.isArray(data.files) ? data.files : [];
    yamlFilesByConversation[currentId] = files;
    renderYamlFileOptions(currentId, files);
    if (files.length && loadSelected) {
      await loadSelectedYamlForCurrentConversation();
    } else {
      setStatus('YAML files refreshed.', 'success');
    }
  } catch (err) {
    renderYamlUnavailable('YAML load failed');
    setStatus('Load YAML files failed: ' + err.message, 'error');
  }
}

async function loadSelectedYamlForCurrentConversation() {

    setYamlEditorValue('');
    setYamlEditorEnabled(false);
    pathEl.textContent = '';
    return;

    setYamlEditorValue('');
    setYamlEditorEnabled(false);

  const worktreeBranchField = document.getElementById('worktree-branch-field');

async function createConversationConfirmed() {
  const mode = createModalMode || 'directory';
  let payload = { title: 'New chat', create_type: mode };

  if (mode === 'directory') {
    if (!pickerCurrentPath) {
      setStatus('Please choose a workdir.', 'error');
      return;
    }
    payload.workdir = pickerCurrentPath;
  } else if (mode === 'clone') {
    const parentDir = String(document.getElementById('clone-parent-input').value || '').trim();
    const repoUrl = String(document.getElementById('clone-url-input').value || '').trim();
    const newDirName = String(document.getElementById('new-dir-name-input').value || '').trim();
    if (!parentDir || !repoUrl || !newDirName) {
      setStatus('Clone requires parent directory, repo URL, and new directory name.', 'error');
      return;
    }
    payload.parent_dir = parentDir;
    payload.repo_url = repoUrl;
    payload.new_dir_name = newDirName;
  } else if (mode === 'worktree') {
    const sourceDir = String(document.getElementById('worktree-source-input').value || '').trim();
    const branchName = String(document.getElementById('worktree-branch-input').value || '').trim();
    const newDirName = String(document.getElementById('new-dir-name-input').value || '').trim();
    if (!sourceDir || !branchName || !newDirName) {
      setStatus('Worktree requires source directory, branch name, and new directory name.', 'error');
      return;
    }
    payload.source_dir = sourceDir;
    payload.branch_name = branchName;
    payload.new_dir_name = newDirName;
  } else if (mode === 'copy') {
    if (!pickerCurrentPath) {
      setStatus('Please choose a source directory to copy.', 'error');
      return;
    }
    payload.source_dir = pickerCurrentPath;
  } else {
    setStatus('Unknown create mode.', 'error');
    return;
  }

  try {
    document.getElementById('new-btn').disabled = true;
    document.getElementById('confirm-create-btn').disabled = true;
    setStatus('Creating Cursor session...', 'busy');
    const data = await api('/api/conversations', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    currentId = data.conversation.id;
    closeCreateModal();
    await loadConversations(currentId);
    refreshComposerControls();
    if (data.reused) {
      setStatus('Existing session opened for this workdir.', 'success');
    } else {
      setStatus('Conversation created.', 'success');
    }
  } catch (err) {
    setStatus('Create failed: ' + err.message, 'error');
  } finally {
    document.getElementById('new-btn').disabled = false;
    document.getElementById('confirm-create-btn').disabled = false;
  }
}

async function openConversation(id, updateList = true) {
  const input = document.getElementById('input');
  if (currentId && input) {
    conversationDrafts[currentId] = input.value;
  }
  currentId = id;
  const data = await api('/api/conversations/' + id);
  currentConversation = data.conversation;
  input.value = conversationDrafts[currentId] || '';
  renderConversation(currentConversation);
  renderPendingTaskRefs();
  renderCurrentConversationStatus();
  refreshComposerControls();
  document.getElementById('delete-btn').disabled = currentConversation.status === 'running';
  document.getElementById('run-task-btn').disabled = false;
  document.getElementById('refresh-task-btn').disabled = false;
  if (isNarrowScreen()) {
    setSidebarHiddenMobile(true);
  }
  syncMobileLayoutState();
  await loadTasksForCurrentConversation(true);
  if (currentView === 'yaml') {
    await loadYamlFileListForCurrentConversation(true);
  } else if (currentView === 'ka') {
    await loadKaForCurrentConversation();
  }
  if (updateList) await loadConversations();
}

function isCanceledTaskStatus(status) {
  const value = String(status || '').toLowerCase();
  return ['canceled', 'cancelled', 'aborted'].includes(value);
}

function taskDisplayStatus(status) {
  return isCanceledTaskStatus(status) ? '[removed]' : String(status || 'unknown');
}

function taskStatusClass(status) {
  const value = normalizeTaskStatus(status);
  if (isRunningLikeTaskStatus(value)) return 'is-running';
  if (isFailedTaskStatus(value)) return 'is-failed';
  if (isCanceledTaskStatus(value)) return 'is-canceled';
  if (['done', 'completed', 'success', 'succeeded', 'ok', 'finished'].includes(value)) {
    return 'is-success';
  }
  return 'is-unknown';
}

function getCurrentTaskById(jobId) {
  const target = String(jobId || '').trim();
  if (!target) return null;
  const list = Array.isArray(currentTasks) ? currentTasks : [];
  return list.find(item => String((item && item.job_id) || '') === target) || null;
}

function conversationHasJob(jobId) {
  if (!currentConversation || !Array.isArray(currentConversation.job_ids)) return false;
  return currentConversation.job_ids.includes(String(jobId || ''));
}

function renderSystemTaskCard(job, forceCanceled = false) {
  const jobId = String((job && job.job_id) || 'unknown');
  const statusRaw = String((job && job.status) || 'unknown');
  const effectiveStatusRaw = forceCanceled ? 'canceled' : statusRaw;
  const status = taskDisplayStatus(effectiveStatusRaw);
  const args = String((job && job.zhh_args) || '');
  const nickname = String((job && job.nickname) || '').trim();
  const createdAt = String((job && job.created_at) || '-');
  const runBtnDisabled = !currentId ? 'disabled' : '';
  const statusLower = String(effectiveStatusRaw || '').toLowerCase();
  const canCancel = statusLower === 'running' || statusLower === 'starting';
  const canRemove = !['running', 'starting', 'queued', 'pending'].includes(statusLower);
  const canceled = forceCanceled || isCanceledTaskStatus(effectiveStatusRaw);

  const actionsHtml = canceled
    ? `<div class="task-meta" style="margin-top:8px;">${escapeHtml(jobId)} is removed</div>`
    : `
      <div class="task-actions">
        <button ${runBtnDisabled} onclick="addTaskReference('${escapeHtml(jobId)}')">Reference</button>
        <button ${runBtnDisabled} onclick="viewTaskLog('${escapeHtml(jobId)}')">Log</button>
        ${canCancel ? `<button ${runBtnDisabled} onclick="cancelTask('${escapeHtml(jobId)}')">Cancel</button>` : ''}
        ${canRemove ? `<button ${runBtnDisabled} onclick="removeTask('${escapeHtml(jobId)}')">Remove</button>` : ''}
      </div>
    `;

  return `
    <div class="task-item" style="margin-top:8px;">
      <div class="task-top">
        <div class="task-id">
          <span class="task-id-main">${escapeHtml(jobId)}</span>
          ${nickname ? `<span class="task-tag system-link">🏷 ${escapeHtml(nickname)}</span>` : ''}
        </div>
        <div class="task-status ${taskStatusClass(effectiveStatusRaw)}">${escapeHtml(status)}</div>
      </div>
      <div class="task-meta">args: ${escapeHtml(args)} · created: ${escapeHtml(createdAt)}</div>
      ${actionsHtml}
    </div>
  `;
}

function renderConversation(conv) {
  document.getElementById('title').textContent = basenameFromPath(conv.cwd) || conv.title || 'Untitled';
  const summary = conversationSummariesById[conv.id] || { id: conv.id, status: conv.status };
  const statusText = effectiveConversationStatus(summary);
  document.getElementById('meta').textContent = `${statusText} · ${conv.cwd}`;
  const messages = document.getElementById('messages');
  messages.innerHTML = '';
  if (!conv.messages || !conv.messages.length) {
    messages.innerHTML = '<div class="empty">No messages yet.</div>';
  } else {
    for (const m of conv.messages) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + m.role;
      const refSources = (m && typeof m.task_ref_sources === 'object' && m.task_ref_sources) ? m.task_ref_sources : {};
      const refs = (m.task_refs || []).map(jobId => {
        const sourceRaw = refSources ? refSources[jobId] : '';
        const sourceLabel = taskRefSourceLabel(sourceRaw);
        return `
          <div class="ref-chip-wrap">
            <span class="ref-chip">🔗 ${escapeHtml(taskRefLabel(jobId))}</span>
            ${sourceLabel ? `<div class="ref-source-line">source: ${escapeHtml(sourceLabel)}</div>` : ''}
          </div>
        `;
      }).join(' ');
      const systemTaskRun = m && m.role === 'system' && m.system_event === 'task_run' && m.job_id;
      let systemTaskCardHtml = '';
      if (systemTaskRun) {
        const synced = getCurrentTaskById(m.job_id);
        const missingInConversation = !conversationHasJob(m.job_id);
        const job = synced || {
          job_id: m.job_id,
          status: m.job_status || 'starting',
          zhh_args: m.zhh_args || '',
          created_at: m.created_at || '-',
          nickname: '',
        };
        systemTaskCardHtml = renderSystemTaskCard(job, missingInConversation);
      }
      const roleHtml = m.role === 'system'
        ? ''
        : `<div class="role">${escapeHtml(m.role)}</div>`;
      const messageBodyClass = m.role === 'system' ? 'system-banner' : 'bubble';

      wrap.innerHTML = `
        ${roleHtml}
        <div class="${messageBodyClass}"><div class="md-content">${renderMarkdownSafe(m.content)}</div></div>
        ${refs ? `<div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">${refs}</div>` : ''}
        ${systemTaskCardHtml}
      `;
      messages.appendChild(wrap);
    }
  }
  messages.scrollTop = messages.scrollHeight;
}

function renderPendingTaskRefs() {
  const row = document.getElementById('composer-ref-row');
  const refs = getTaskRefsForConversation(currentId);
  if (!refs.length) {
    row.innerHTML = '';
    return;
  }
  row.innerHTML = refs.map(jobId => `
    <span class="ref-chip">🔗 ${escapeHtml(taskRefLabel(jobId))}
      <button onclick="removeTaskReference('${escapeHtml(jobId)}')">×</button>
    </span>
  `).join('');
}

function taskRefLabel(jobId) {
  const taskMeta = (currentConversation && currentConversation.task_meta) ? currentConversation.task_meta : {};
  const entry = taskMeta ? taskMeta[jobId] : null;
  const nickname = entry && entry.nickname ? String(entry.nickname).trim() : '';
  return nickname || shortJobId(jobId);
}

function taskRefSourceLabel(source) {
  const raw = String(source || '').trim();
  if (!raw) return '';
  if (raw === 'tmux out' || raw === 'zhh_log') return 'tmux out';
  return 'output.log';
}

function addTaskReference(jobId) {
  if (!jobId) return;
  const refs = getTaskRefsForConversation(currentId);
  if (!refs.includes(jobId)) {
    refs.push(jobId);
    renderPendingTaskRefs();
    setStatus(`Referenced task ${shortJobId(jobId)}.`, 'success');
  }
}

function removeTaskReference(jobId) {
  if (!currentId) return;
  conversationTaskRefs[currentId] = getTaskRefsForConversation(currentId).filter(x => x !== jobId);
  renderPendingTaskRefs();
}

function basenameFromPath(path) {
  if (!path) return '';
  const cleaned = String(path).replace(/\/+$/, '');
  const parts = cleaned.split('/');
  return parts[parts.length - 1] || cleaned;
}

function resetConversationView() {

  currentConversation = null;
  document.getElementById('title').textContent = 'No conversation selected';
  document.getElementById('meta').textContent = 'Create a new session first.';
  document.getElementById('messages').innerHTML = '<div class="empty">No conversation selected.</div>';
  document.getElementById('tasks-list').innerHTML = '<div class="empty">No conversation selected.</div>';
  document.getElementById('input').value = '';
  refreshComposerControls();
  document.getElementById('delete-btn').disabled = true;
  document.getElementById('run-task-btn').disabled = true;
  document.getElementById('refresh-task-btn').disabled = true;
  renderYamlUnavailable('No conversation selected.');
  renderKaUnavailable('No conversation selected.');

  renderCurrentConversationStatus();

}

async function deleteCurrentConversation() {
  if (!currentId) return;
  const taskCount = (currentConversation && currentConversation.job_ids)
    ? currentConversation.job_ids.length
    : 0;
  const confirmText = taskCount > 0
    ? `This session has ${taskCount} task(s). Deleting session will clear all tasks (running tasks will be cancelled). Continue?`
    : 'Delete this managed session from the server list?';
  if (!confirm(confirmText)) return;

  const deletingId = currentId;
  try {
    document.getElementById('delete-btn').disabled = true;
    setStatus('Deleting session...', 'busy');
    await api(`/api/conversations/${deletingId}`, { method: 'DELETE' });
    delete conversationDrafts[deletingId];
    delete conversationTaskRefs[deletingId];
    delete lastStatusByConversation[deletingId];
    delete yamlFilesByConversation[deletingId];
    delete yamlSelectionByConversation[deletingId];
    delete kaContentByConversation[deletingId];
    resetConversationView();
    await loadConversations();
    setStatus('Session deleted.', 'success');
  } catch (err) {
    if (currentConversation) {
      document.getElementById('delete-btn').disabled = currentConversation.status === 'running';
    }
    setStatus('Delete failed: ' + err.message, 'error');
  }
}

async function sendMessage() {
  const input = document.getElementById('input');
  const originalDraft = input.value;
  const text = originalDraft.trim();
  if (!currentId || !text) return false;
  const targetId = currentId;
  const refs = [...getTaskRefsForConversation(targetId)];
  const optimisticMessageId = 'optimistic-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  let forceSend = false;
  if (currentConversation && currentConversation.status === 'running') {
    const ok = confirm('This session is still marked as waiting for Cursor. Force send and ignore previous unprocessed message?');
    if (!ok) return;
    forceSend = true;
  }
  try {
    sendingConversationIds.add(targetId);
    conversationDrafts[targetId] = '';
    if (currentId === targetId) {
      input.value = '';
      if (currentConversation) {
        const messages = Array.isArray(currentConversation.messages) ? currentConversation.messages : [];
        messages.push({
          id: optimisticMessageId,
          role: 'user',
          content: text,
          created_at: Date.now() / 1000,
          task_refs: refs,
        });
        currentConversation.messages = messages;
        renderConversation(currentConversation);
      }
    }
    refreshComposerControls();
    
    setStatus('Waiting for Cursor...', 'busy', targetId);
    const data = await api(`/api/conversations/${targetId}/messages`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text, task_refs: refs, force_send: forceSend })
    });
    conversationDrafts[targetId] = '';
    conversationTaskRefs[targetId] = [];
    if (currentId === targetId) {
      input.value = '';
      renderPendingTaskRefs();
      currentConversation = data.conversation;
      renderConversation(currentConversation);
    }
    await loadConversations();
    setStatus('Done.', 'success', targetId);
    return true;
  } catch (err) {
    conversationDrafts[targetId] = originalDraft;
    if (currentId === targetId) {
      input.value = originalDraft;
      if (currentConversation && Array.isArray(currentConversation.messages)) {
        currentConversation.messages = currentConversation.messages.filter(m => m.id !== optimisticMessageId);
        renderConversation(currentConversation);
      }
    }
    setStatus('Send failed: ' + err.message, 'error', targetId);
    return false;
  } finally {
    sendingConversationIds.delete(targetId);
    refreshComposerControls();
    if (currentConversation) {
      document.getElementById('delete-btn').disabled = currentConversation.status === 'running';
    }
  }
}

function renderTasks(items, conversationId = currentId) {
  if (conversationId === currentId) {
    currentTasks = items || [];
  }
  if (conversationId === currentId && currentConversation) {
    const taskMeta = currentConversation.task_meta || {};
    for (const job of (items || [])) {
      const jobId = job && job.job_id ? String(job.job_id) : '';
      if (!jobId) continue;
      const nickname = String(job.nickname || '').trim();
      if (nickname) {
        taskMeta[jobId] = {
          ...(taskMeta[jobId] || {}),
          nickname,
        };
      } else {
        delete taskMeta[jobId];
      }
    }
    currentConversation.task_meta = taskMeta;
    renderConversation(currentConversation);
    renderPendingTaskRefs();
  }
  if (conversationId !== currentId) {
    return;
  }
  const root = document.getElementById('tasks-list');
  if (!items || !items.length) {
    root.innerHTML = '<div class="empty">No tasks in this conversation yet.</div>';
    return;
  }

  root.innerHTML = '';
  for (const [jobIndex, job] of items.entries()) {
    const div = document.createElement('div');
    div.className = 'task-item';
    const jobId = String(job.job_id || 'unknown');
    const status = job.status || 'unknown';
    const args = job.zhh_args || '';
    const nickname = (job.nickname || '').trim();
    const createdAt = job.created_at || '-';
    const runBtnDisabled = !currentId ? 'disabled' : '';
    const canCancel = status === 'running' || status === 'starting';
    const statusLower = String(status).toLowerCase();
    const canRemove = !['running', 'starting', 'queued', 'pending'].includes(statusLower);
    const unread = !!job.unread;
    const alertKind = String(job.alert_kind || '').toLowerCase();
    const taskAlertHtml = unread
      ? (alertKind === 'failed'
        ? '<span class="task-alert failed" title="Task failed">!</span>'
        : '<span class="task-alert" title="Task update"></span>')
      : '';
    div.innerHTML = `
      <div class="task-top">
        <div class="task-id">
          <span class="task-id-main">${escapeHtml(jobId)}</span>
          ${nickname ? `<span class="task-tag nickname">🏷 ${escapeHtml(nickname)}</span>` : ''}
          ${taskAlertHtml}
        </div>
        <div class="task-status ${taskStatusClass(status)}">${escapeHtml(status)}</div>
      </div>
      <div class="task-meta">args: ${escapeHtml(args)} · created: ${escapeHtml(createdAt)}</div>
      <div class="task-actions">
        <button type="button" class="task-nickname-btn" data-task-index="${jobIndex}">Nickname</button>
        <button ${runBtnDisabled} onclick="addTaskReference('${escapeHtml(jobId)}')">Reference</button>
        <button ${runBtnDisabled} onclick="viewTaskLog('${escapeHtml(jobId)}')">Log</button>
        ${canCancel ? `<button ${runBtnDisabled} onclick="cancelTask('${escapeHtml(jobId)}')">Cancel</button>` : ''}
        ${canRemove ? `<button ${runBtnDisabled} onclick="removeTask('${escapeHtml(jobId)}')">Remove</button>` : ''}
      </div>
      <div class="task-nickname-editor" data-task-index="${jobIndex}">
        <input type="text" class="task-nickname-input" maxlength="80" placeholder="Task nickname" />
        <button type="button" class="task-nickname-save-btn">Save</button>
        <button type="button" class="task-nickname-cancel-btn">Cancel</button>
      </div>
    `;
    const nicknameBtn = div.querySelector('.task-nickname-btn');
    const nicknameEditor = div.querySelector('.task-nickname-editor');
    const nicknameInput = div.querySelector('.task-nickname-input');
    const nicknameSaveBtn = div.querySelector('.task-nickname-save-btn');
    const nicknameCancelBtn = div.querySelector('.task-nickname-cancel-btn');

    if (nicknameInput) nicknameInput.value = nickname;

    if (nicknameBtn && nicknameEditor && nicknameInput) {
      nicknameBtn.addEventListener('click', () => {
        nicknameEditor.style.display = 'flex';
        nicknameInput.focus();
        nicknameInput.select();
      });
    }

    if (nicknameSaveBtn && nicknameInput && nicknameEditor) {
      nicknameSaveBtn.addEventListener('click', async () => {
        await saveTaskNicknameByIndex(jobIndex, nicknameInput.value);
      });
    }

    if (nicknameCancelBtn && nicknameInput && nicknameEditor) {
      nicknameCancelBtn.addEventListener('click', () => {
        nicknameInput.value = nickname;
        nicknameEditor.style.display = 'none';
      });
    }

    if (nicknameInput) {
      nicknameInput.addEventListener('keydown', async (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          await saveTaskNicknameByIndex(jobIndex, nicknameInput.value);
        }
      });
    }

    root.appendChild(div);
  }
}

async function saveTaskNicknameByIndex(index, nicknameValue) {
  const task = currentTasks[index] || {};
  const jobId = String(task.job_id || '').trim();
  if (!jobId) {
    setStatus('Task id missing, cannot set nickname.', 'error');
    return;
  }
  await saveTaskNickname(jobId, nicknameValue);
}

async function saveTaskNickname(jobId, nicknameValue) {
  if (!currentId || !jobId) return;
  try {
    const nextNickname = String(nicknameValue || '').trim();
    setStatus('Saving nickname...', 'busy');
    await api(`/api/conversations/${currentId}/tasks/${jobId}/nickname`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ nickname: nextNickname })
    });

    if (currentConversation) {
      const taskMeta = currentConversation.task_meta || {};
      if (nextNickname) {
        taskMeta[jobId] = {
          ...(taskMeta[jobId] || {}),
          nickname: nextNickname,
        };
      } else {
        delete taskMeta[jobId];
      }
      currentConversation.task_meta = taskMeta;
      renderConversation(currentConversation);
      renderPendingTaskRefs();
    }

    await loadTasksForCurrentConversation();
    setStatus('Nickname saved.', 'success');
  } catch (err) {
    setStatus('Save nickname failed: ' + err.message, 'error');
  }
}

async function loadTasksForCurrentConversation(silent = false) {
  const targetId = currentId;
  if (!targetId) {
    document.getElementById('tasks-list').innerHTML = '<div class="empty">No conversation selected.</div>';
    return;
  }
  try {
    if (!silent) {
      setStatus('Loading tasks...', 'busy');
    }
    const data = await api(`/api/conversations/${targetId}/tasks`);
    const jobs = Array.isArray(data.jobs) ? data.jobs : [];
    const runtime = runtimeStatusFromJobs(jobs);
    if (runtime) {
      conversationTaskRuntimeStatus[targetId] = runtime;
    } else {
      delete conversationTaskRuntimeStatus[targetId];
    }
    renderTasks(jobs, targetId);
    if (targetId !== currentId) {
      return;
    }
    if (!silent) {
      setStatus('Tasks refreshed.', 'success');
    }
  } catch (err) {
    if (targetId !== currentId) {
      return;
    }
    if (!silent) {
      setStatus('Load tasks failed: ' + err.message, 'error');
    }
  }
}

async function runTaskForCurrentConversation(argsOverride = null, conversationId = null) {
  const targetId = String(conversationId || currentId || '').trim();
  if (!targetId) return null;
  try {
    const args = argsOverride === null
      ? document.getElementById('task-args').value.trim()
      : String(argsOverride);
    document.getElementById('run-task-btn').disabled = true;
    setStatus('Creating task in /run...', 'busy', targetId);
    const runData = await api(`/api/conversations/${targetId}/tasks/run`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ args })
    });
    const jobId = String((runData.job && runData.job.job_id) || '').trim();
    await loadConversations(targetId);
    if (currentId === targetId) {
      await loadTasksForCurrentConversation();
    }
    pollTaskNotifications();
    setStatus('Task created.', 'success', targetId);
    return jobId || null;
  } catch (err) {
    setStatus('Run task failed: ' + err.message, 'error', targetId);
    return null;
  } finally {
    document.getElementById('run-task-btn').disabled = !currentId;
    refreshComposerControls();
  }
}

async function runTaskQuickFromChat() {
  await runTaskForCurrentConversation('');
}

async function handleAutoIterateButton() {
  const targetId = currentId;
  if (!targetId) return;
  const summary = conversationSummariesById[targetId] || {};
  if (summary.auto_iterating) {
    await stopAutoIteration();
    return;
  }
  await startAutoIteration();
}

async function startAutoIteration() {
  const targetId = currentId;
  const input = document.getElementById('input');
  const firstText = String((input && input.value) || '').trim();
  if (!targetId) return;
  if (!firstText) {
    setStatus('Auto iterate requires message text in the input box.', 'error');
    return;
  }
  const summary = conversationSummariesById[targetId] || {};
  if (summary.auto_iterating) {
    setStatus('Auto iterate is already running for this conversation.', 'busy');
    return;
  }

  try {
    setStatus('Starting backend auto iterate...', 'busy', targetId);
    await api(`/api/conversations/${targetId}/auto-iterate/start`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text: firstText, max_rounds: 8 })
    });

    conversationDrafts[targetId] = '';
    if (currentId === targetId && input) {
      input.value = '';
    }
    await loadConversations(targetId);
    if (currentId === targetId) {
      await openConversation(targetId, false);
    }
    setStatus('Auto iterate running in backend.', 'success', targetId);
  } catch (err) {
    setStatus('Auto iterate failed: ' + (err && err.message ? err.message : String(err)), 'error', targetId);
  }
  refreshComposerControls();
}

async function stopAutoIteration() {
  const targetId = currentId;
  if (!targetId) return;
  try {
    setStatus('Stopping auto iterate...', 'busy', targetId);
    if (conversationSummariesById[targetId]) {
      conversationSummariesById[targetId].status = 'stopping';
      conversationSummariesById[targetId].auto_iterating = true;
    }
    refreshComposerControls();
    renderCurrentConversationStatus();
    await api(`/api/conversations/${targetId}/auto-iterate/stop`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
    });
    await loadConversations(targetId);
    if (currentId === targetId) {
      await openConversation(targetId, false);
    }
    setStatus('Stop signal sent for auto iterate.', 'success', targetId);
  } catch (err) {
    setStatus('Stop auto iterate failed: ' + (err && err.message ? err.message : String(err)), 'error', targetId);
  }
  refreshComposerControls();
}

async function cancelTask(jobId) {
  if (!currentId || !jobId) return;
  if (!confirm(`Cancel task ${jobId}?`)) return;
  try {
    setStatus('Cancelling task...', 'busy');
    await api(`/api/conversations/${currentId}/tasks/${jobId}/cancel`, { method: 'POST' });
    await loadTasksForCurrentConversation();
    pollTaskNotifications();
    setStatus('Task cancelled.', 'success');
  } catch (err) {
    setStatus('Cancel failed: ' + err.message, 'error');
  }
}

async function removeTask(jobId) {
  if (!currentId || !jobId) return;
  try {
    setStatus('Removing task...', 'busy');
    await api(`/api/conversations/${currentId}/tasks/${jobId}`, { method: 'DELETE' });
    conversationTaskRefs[currentId] = getTaskRefsForConversation(currentId).filter(x => x !== jobId);
    renderPendingTaskRefs();
    if (currentConversation && currentConversation.task_meta) {
      delete currentConversation.task_meta[jobId];
      renderConversation(currentConversation);
    }
    await loadConversations(currentId);
    await loadTasksForCurrentConversation();
    pollTaskNotifications();
    setStatus('Task removed.', 'success');
  } catch (err) {
    setStatus('Remove task failed: ' + err.message, 'error');
  }
}

async function viewTaskLog(jobId) {
  if (!currentId || !jobId) return;
  try {
    setStatus('Fetching task log...', 'busy');
    const data = await api(`/api/conversations/${currentId}/tasks/${jobId}/log?lines=400`);
    const logText = data.log || '[no log output]';
    openLogModal(jobId, logText, data.source || '');
    await loadTasksForCurrentConversation();
    await loadConversations();
    setStatus('Log fetched.', 'success');
  } catch (err) {
    setStatus('Fetch log failed: ' + err.message, 'error');
  }
}

function handleKey(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendMessage();
  }
}

document.getElementById('input').addEventListener('input', (event) => {
  if (!currentId) return;
  conversationDrafts[currentId] = event.target.value;
  refreshComposerControls();
});

function escapeHtml(s) {
  return String(s)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;');
}

function renderPlainTextHtml(s) {
  return escapeHtml(String(s || '')).replace(/\n/g, '<br>');
}

function renderMarkdownSafe(text) {
  const input = String(text || '');
  try {
    if (window.marked && typeof window.marked.parse === 'function') {
      window.marked.setOptions({
        gfm: true,
        breaks: true,
        headerIds: false,
        mangle: false,
      });
      const rawHtml = window.marked.parse(input);
      if (window.DOMPurify && typeof window.DOMPurify.sanitize === 'function') {
        return window.DOMPurify.sanitize(String(rawHtml), {
          USE_PROFILES: { html: true },
        });
      }
      return renderPlainTextHtml(input);
    }
  } catch (err) {
    console.warn('Markdown render fallback:', err);
  }
  return renderPlainTextHtml(input);
}

function shortJobId(jobId) {
  return String(jobId || '').slice(0, 8);
}

bootstrapConversations();
window.addEventListener('resize', syncMobileLayoutState);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    pollTaskNotifications();
  }
});
</script>
